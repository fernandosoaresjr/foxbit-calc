{{/*
Secret de pull de imagem (kubernetes.io/dockerconfigjson) criado pelo chart a
partir de credenciais fornecidas no deploy (ex.: pelo workflow de CD). Use para
registries privados (GHCR, Docker Hub). Para um Secret já existente, deixe
imagePullSecret.create=false e use a lista imagePullSecrets.
*/}}
{{- if .Values.imagePullSecret.create }}
{{- include "foxbit-calc.validateImagePullSecret" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "foxbit-calc.pullSecretName" . }}
  labels:
    {{- include "foxbit-calc.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "foxbit-calc.dockerconfigjson" . }}
{{- end }}
