{{/*
Secret gerado pelo chart apenas para Redis EXTERNO com senha em texto puro e
sem existingSecret. Quando existingSecret é informado, este recurso não é criado.
*/}}
{{- if and .Values.cache.enabled (eq .Values.cache.type "external") .Values.cache.external.password (not .Values.cache.external.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "foxbit-calc.redisSecretName" . }}
  labels:
    {{- include "foxbit-calc.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.cache.external.existingSecretPasswordKey }}: {{ .Values.cache.external.password | quote }}
{{- end }}
