{{/*
ServiceMonitor da aplicação. Criado somente quando:
  - serviceMonitor.enabled = true, E
  - o CRD monitoring.coreos.com/v1 (Prometheus Operator) está disponível.
Se estiver habilitado mas o CRD não existir, a instalação PROSSEGUE sem o
ServiceMonitor e um aviso é exibido nas NOTES (ver NOTES.txt).
*/}}
{{- if .Values.serviceMonitor.enabled }}
{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "foxbit-calc.fullname" . }}
  labels:
    {{- include "foxbit-calc.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "foxbit-calc.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end }}
{{- end }}

{{/*
ServiceMonitor do Redis INTERNO. Criado com a MESMA lógica do ServiceMonitor da
aplicação (flag + checagem do CRD), apontando para o service de métricas do
subchart bitnami/redis. Evita o ServiceMonitor não-protegido do subchart.
*/}}
{{- if and .Values.serviceMonitor.enabled .Values.cache.enabled (eq .Values.cache.type "internal") .Values.redis.metrics.enabled }}
{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "foxbit-calc.fullname" . }}-redis
  labels:
    {{- include "foxbit-calc.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: redis
      app.kubernetes.io/component: metrics
  endpoints:
    - port: http-metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end }}
{{- end }}
