apiVersion: v1
kind: Service
metadata:
  name: {{ include "foxbit-calc.fullname" . }}
  labels:
    {{- include "foxbit-calc.labels" . | nindent 4 }}
spec:
  # ClusterIP: a aplicação fica acessível SOMENTE dentro do cluster.
  type: {{ .Values.service.type }}
  selector:
    {{- include "foxbit-calc.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
