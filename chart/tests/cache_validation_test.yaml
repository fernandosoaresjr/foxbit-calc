suite: cache validation
templates:
  - templates/deployment.yaml
  - templates/configmap.yaml
tests:
  - it: falha no modo interno sem redis.enabled
    template: templates/deployment.yaml
    set:
      cache.enabled: true
      cache.type: internal
      redis.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "cache.enabled=true com cache.type=internal exige redis.enabled=true (subchart bitnami/redis)"

  - it: falha no modo externo sem address
    template: templates/deployment.yaml
    set:
      cache.enabled: true
      cache.type: external
      cache.external.address: ""
    asserts:
      - failedTemplate:
          errorMessage: "cache.type=external exige cache.external.address"

  - it: falha com cache.type inválido
    template: templates/deployment.yaml
    set:
      cache.enabled: true
      cache.type: memcached
    asserts:
      - failedTemplate: {}

  - it: não falha quando o cache está desabilitado
    template: templates/deployment.yaml
    set:
      cache.enabled: false
    asserts:
      - isKind:
          of: Deployment
