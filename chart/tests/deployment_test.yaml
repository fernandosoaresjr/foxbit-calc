suite: deployment
templates:
  - templates/deployment.yaml
  - templates/configmap.yaml
tests:
  - it: define o número de réplicas
    template: templates/deployment.yaml
    set:
      replicaCount: 3
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 3

  - it: usa a imagem e a tag configuradas
    template: templates/deployment.yaml
    set:
      image.repository: example.com/calc
      image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: example.com/calc:1.2.3

  - it: cai para appVersion quando image.tag é vazio
    template: templates/deployment.yaml
    chart:
      appVersion: "9.9.9"
    set:
      image.repository: example.com/calc
      image.tag: ""
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: example.com/calc:9.9.9

  - it: roda como não-root com root filesystem somente leitura
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: configura as três probes apontando para os endpoints de saúde
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz

  - it: não injeta REDIS_PASSWORD quando o cache está desabilitado
    template: templates/deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
          any: true

  - it: injeta REDIS_PASSWORD via secretKeyRef no modo externo com senha
    template: templates/deployment.yaml
    set:
      cache.enabled: true
      cache.type: external
      cache.external.address: redis.prod:6379
      cache.external.password: s3cr3t
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-foxbit-calc-redis-external
                key: redis-password
          any: true
