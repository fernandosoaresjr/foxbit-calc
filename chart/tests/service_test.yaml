suite: service
templates:
  - templates/service.yaml
tests:
  - it: é ClusterIP na porta 8000 (acessível só dentro do cluster)
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8000
      - equal:
          path: spec.ports[0].name
          value: http

  - it: respeita a porta configurada
    set:
      service.port: 9000
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9000
