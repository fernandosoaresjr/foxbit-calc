suite: servicemonitor
templates:
  - templates/servicemonitor.yaml
tests:
  - it: não cria nada quando desabilitado
    set:
      serviceMonitor.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: não cria quando habilitado mas sem o CRD do Prometheus Operator
    set:
      serviceMonitor.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: cria o ServiceMonitor da aplicação quando o CRD está disponível
    set:
      serviceMonitor.enabled: true
      serviceMonitor.interval: 15s
    capabilities:
      apiVersions:
        - monitoring.coreos.com/v1
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.endpoints[0].interval
          value: 15s

  - it: cria SM da app e do redis no modo interno com CRD
    set:
      serviceMonitor.enabled: true
      cache.enabled: true
      cache.type: internal
      redis.enabled: true
    capabilities:
      apiVersions:
        - monitoring.coreos.com/v1
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-foxbit-calc-redis
        documentIndex: 1
      - equal:
          path: spec.endpoints[0].port
          value: http-metrics
        documentIndex: 1
