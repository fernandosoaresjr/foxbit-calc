suite: servicemonitor
templates:
  - templates/servicemonitor.yaml
tests:
  - it: não cria nada quando desabilitado
    set:
      serviceMonitor.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: não cria quando habilitado mas sem o CRD do Prometheus Operator
    set:
      serviceMonitor.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: cria o ServiceMonitor quando o CRD está disponível
    set:
      serviceMonitor.enabled: true
      serviceMonitor.interval: 15s
    capabilities:
      apiVersions:
        - monitoring.coreos.com/v1
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.endpoints[0].interval
          value: 15s
