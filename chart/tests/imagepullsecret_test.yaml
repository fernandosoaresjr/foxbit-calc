suite: image pull secret
templates:
  - templates/image-pull-secret.yaml
  - templates/deployment.yaml
  - templates/configmap.yaml
tests:
  - it: não cria pull secret por padrão
    template: templates/image-pull-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: cria um Secret dockerconfigjson quando habilitado
    template: templates/image-pull-secret.yaml
    set:
      imagePullSecret.create: true
      imagePullSecret.registry: ghcr.io
      imagePullSecret.username: fulano
      imagePullSecret.password: tok123
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-foxbit-calc-pull
      - equal:
          path: type
          value: kubernetes.io/dockerconfigjson
      - exists:
          path: data[".dockerconfigjson"]

  - it: referencia o pull secret criado no deployment
    template: templates/deployment.yaml
    set:
      imagePullSecret.create: true
      imagePullSecret.username: fulano
      imagePullSecret.password: tok123
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: RELEASE-NAME-foxbit-calc-pull
          any: true

  - it: combina pull secrets existentes com o criado pelo chart
    template: templates/deployment.yaml
    set:
      imagePullSecrets:
        - name: ghcr-creds
      imagePullSecret.create: true
      imagePullSecret.username: fulano
      imagePullSecret.password: tok123
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: ghcr-creds
          any: true
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: RELEASE-NAME-foxbit-calc-pull
          any: true

  - it: falha quando habilitado sem credenciais
    template: templates/image-pull-secret.yaml
    set:
      imagePullSecret.create: true
      imagePullSecret.username: ""
      imagePullSecret.password: ""
    asserts:
      - failedTemplate:
          errorMessage: "imagePullSecret.create=true exige imagePullSecret.registry, .username e .password"
