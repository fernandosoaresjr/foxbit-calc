suite: configmap
templates:
  - templates/configmap.yaml
tests:
  - it: cache desabilitado por padrão e sem REDIS_ADDR
    asserts:
      - equal:
          path: data.CACHE_ENABLED
          value: "false"
      - notExists:
          path: data.REDIS_ADDR

  - it: modo interno aponta para o serviço do subchart redis
    set:
      cache.enabled: true
      cache.type: internal
      redis.enabled: true
    asserts:
      - equal:
          path: data.CACHE_ENABLED
          value: "true"
      - equal:
          path: data.REDIS_ADDR
          value: RELEASE-NAME-redis-master:6379
      - equal:
          path: data.CACHE_TTL
          value: "60s"

  - it: modo externo usa o endereço informado
    set:
      cache.enabled: true
      cache.type: external
      cache.external.address: redis.prod:6379
      cache.external.db: 3
    asserts:
      - equal:
          path: data.REDIS_ADDR
          value: redis.prod:6379
      - equal:
          path: data.REDIS_DB
          value: "3"

  - it: propaga nível e formato de log
    set:
      logging.level: debug
      logging.format: text
    asserts:
      - equal:
          path: data.LOG_LEVEL
          value: debug
      - equal:
          path: data.LOG_FORMAT
          value: text
