# =============================================================================
# Values de EXEMPLO para o avaliador (ambiente Foxbit).
#
# Este arquivo sobrescreve os defaults do chart (chart/values.yaml). Ele JÁ vem
# com o cache habilitado (Redis interno) para demonstrar o cache em ação.
# Ajuste os campos marcados com  # <-- AJUSTE  conforme o seu ambiente.
#
# Uso:
#   helm dependency build ./chart
#   helm upgrade --install foxbit-calc ./chart -n foxbit-calc --create-namespace \
#     -f k8s/values.yaml
# =============================================================================

image:
  # Imagem publicada pelo CI no GHCR. Troque pela sua se fizer fork.
  repository: ghcr.io/fernandosoaresjr/foxbit-calc  # <-- AJUSTE (owner do fork)
  tag: ""           # vazio = usa o appVersion do chart; o CD seta a tag do commit
  pullPolicy: IfNotPresent

# Se a imagem do GHCR for privada, crie um secret de pull e referencie aqui:
# imagePullSecrets:
#   - name: ghcr-creds

replicaCount: 2

service:
  type: ClusterIP   # acessível somente dentro do cluster (requisito do desafio)
  port: 8000

logging:
  level: info
  format: json

# Delay que simula a operação custosa (efeito visível em cache miss).
calcDelay: "5s"

# -----------------------------------------------------------------------------
# Cache: habilitado com Redis INTERNO (subchart bitnami/redis).
# Para usar um Redis EXTERNO, comente o bloco "redis:" abaixo e use:
#   cache:
#     enabled: true
#     type: external
#     external:
#       address: "meu-redis.host:6379"   # <-- AJUSTE
#       existingSecret: "meu-redis-auth" # <-- AJUSTE (chave: redis-password)
# -----------------------------------------------------------------------------
cache:
  enabled: true
  type: internal
  ttl: "60s"

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
  metrics:
    enabled: true

# -----------------------------------------------------------------------------
# Monitoramento: habilite se o cluster tiver o Prometheus Operator instalado.
# Se habilitar sem o CRD, a instalação prossegue e exibe um aviso (sem o
# ServiceMonitor). Comece com false e mude para true se aplicável.
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: false    # <-- AJUSTE para true se houver Prometheus Operator
  interval: 30s

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi
