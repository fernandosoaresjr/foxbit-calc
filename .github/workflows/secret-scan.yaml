name: Secret Scan

# Verifica se alguma credencial/segredo foi commitado (chaves, tokens, senhas).
# Roda em todo push e pull request, varrendo o diff (e o histórico em push).

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Histórico completo para varrer todos os commits em push.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Para repositórios de ORGANIZAÇÃO, o gitleaks-action exige uma licença
          # gratuita: configure o secret GITLEAKS_LICENSE. Para repositórios
          # pessoais/públicos não é necessário.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
