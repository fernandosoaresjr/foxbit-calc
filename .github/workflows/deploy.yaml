name: Deploy

# CD: faz deploy da aplicação no cluster via Helm e verifica o resultado.
#
# Dispara em push na main quando MUDA o app, o chart ou os values. Como um merge
# é UM único evento de push, há sempre UM único deploy — mesmo que o PR tenha
# alterado app e chart ao mesmo tempo.
#
# Ordem imagem -> deploy: o deploy roda em paralelo ao "App CI". Se o app mudou,
# usa a tag do commit (sha) e AGUARDA a imagem aparecer no GHCR antes de
# implantar. Se só o chart/values mudou (app inalterado), implanta a imagem
# `latest` já publicada.

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - Dockerfile
      - api/openapi.yaml
      - oapi-codegen.yaml
      - chart/**
      - k8s/**
      - .github/workflows/deploy.yaml
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag da imagem a implantar (default: resolvida automaticamente)"
        required: false
        default: ""

# Garante que dois deploys nunca rodem ao mesmo tempo (merges em sequência são
# enfileirados, não cancelados).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  HELM_VERSION: "v3.17.1"
  NAMESPACE: foxbit-calc
  RELEASE: foxbit-calc

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed areas
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            app:
              - '**.go'
              - go.mod
              - go.sum
              - Dockerfile
              - api/openapi.yaml
              - oapi-codegen.yaml

      - name: Resolve image reference
        id: ref
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_TAG: ${{ github.event.inputs.image_tag }}
          APP_CHANGED: ${{ steps.changes.outputs.app }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          IMAGE=$(echo "ghcr.io/$REPO" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          if [ "$EVENT" = "workflow_dispatch" ] && [ -n "$DISPATCH_TAG" ]; then
            echo "tag=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
            echo "wait=false" >> "$GITHUB_OUTPUT"
          elif [ "$APP_CHANGED" = "true" ]; then
            # App mudou: implanta a imagem deste commit (App CI a está publicando).
            echo "tag=$SHA" >> "$GITHUB_OUTPUT"
            echo "wait=true" >> "$GITHUB_OUTPUT"
          else
            # Só chart/values mudou: implanta a imagem já publicada.
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "wait=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for image to be published
        if: steps.ref.outputs.wait == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          IMG: ${{ steps.ref.outputs.image }}:${{ steps.ref.outputs.tag }}
        run: |
          echo "$GH_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
          echo "Aguardando $IMG (App CI publicando)..."
          for i in $(seq 1 40); do
            if docker buildx imagetools inspect "$IMG" >/dev/null 2>&1; then
              echo "Imagem disponível."; exit 0
            fi
            echo "  ... ainda não disponível ($i/40)"; sleep 15
          done
          echo "Timeout aguardando a imagem $IMG (o App CI falhou ou demorou)."; exit 1

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl cluster-info

      - name: Build chart dependencies
        run: helm dependency build ./chart

      - name: Deploy with Helm
        env:
          # PAT com read:packages para o cluster baixar a imagem do GHCR.
          # Se vazio (imagem pública), nenhum pull secret é criado.
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          ACTOR: ${{ github.actor }}
          IMAGE: ${{ steps.ref.outputs.image }}
          TAG: ${{ steps.ref.outputs.tag }}
        run: |
          PULL_ARGS=()
          if [ -n "${GHCR_PULL_TOKEN}" ]; then
            echo "GHCR_PULL_TOKEN presente: criando pull secret gerenciado pelo chart."
            PULL_ARGS+=(--set imagePullSecret.create=true)
            PULL_ARGS+=(--set imagePullSecret.registry=ghcr.io)
            PULL_ARGS+=(--set imagePullSecret.username="${ACTOR}")
            PULL_ARGS+=(--set-string imagePullSecret.password="${GHCR_PULL_TOKEN}")
          else
            echo "Sem GHCR_PULL_TOKEN: assumindo imagem pública (sem pull secret)."
          fi
          echo "Implantando ${IMAGE}:${TAG}"
          helm upgrade --install "$RELEASE" ./chart \
            --namespace "$NAMESPACE" --create-namespace \
            -f k8s/values.yaml \
            --set image.tag="${TAG}" \
            "${PULL_ARGS[@]}" \
            --wait --timeout 5m

      - name: Verify rollout
        run: |
          kubectl -n "$NAMESPACE" rollout status deploy/"$RELEASE" --timeout=120s
          kubectl -n "$NAMESPACE" get pods -o wide

      - name: Smoke test inside the cluster
        run: |
          set -euo pipefail
          SVC="http://$RELEASE.$NAMESPACE.svc.cluster.local:8000"
          echo "Checking $SVC/healthz and an operation..."
          kubectl -n "$NAMESPACE" run "smoke-$GITHUB_RUN_ID" \
            --rm -i --restart=Never --image=curlimages/curl:8.10.1 --command -- \
            sh -c "curl -sf $SVC/healthz && echo && curl -sf '$SVC/api/sum?term_one=4&term_two=1'"

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "::group::Pods"; kubectl -n "$NAMESPACE" get pods -o wide || true; echo "::endgroup::"
          echo "::group::Describe"; kubectl -n "$NAMESPACE" describe pods || true; echo "::endgroup::"
          echo "::group::Logs"; kubectl -n "$NAMESPACE" logs -l app.kubernetes.io/name=foxbit-calc --tail=200 || true; echo "::endgroup::"
