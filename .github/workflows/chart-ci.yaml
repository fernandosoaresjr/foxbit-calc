name: Chart CI

# CI do Helm Chart: lint e testes unitários (helm unittest).

on:
  push:
    branches: [main]
    paths:
      - "chart/**"
      - "k8s/**"
      - ".github/workflows/chart-ci.yaml"
  pull_request:
    paths:
      - "chart/**"
      - "k8s/**"
      - ".github/workflows/chart-ci.yaml"

env:
  HELM_VERSION: "v3.17.1"
  HELM_UNITTEST_VERSION: "0.7.2"

jobs:
  lint-test:
    name: Lint & Unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Build chart dependencies
        run: helm dependency build ./chart

      - name: Helm lint
        run: helm lint ./chart

      - name: Install helm-unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest \
            --version ${{ env.HELM_UNITTEST_VERSION }}

      - name: Helm unittest
        run: helm unittest ./chart

      - name: Render templates (sanity)
        run: |
          helm template foxbit-calc ./chart -f k8s/values.yaml > /dev/null
          helm template foxbit-calc ./chart \
            --set serviceMonitor.enabled=true \
            --api-versions monitoring.coreos.com/v1 > /dev/null
